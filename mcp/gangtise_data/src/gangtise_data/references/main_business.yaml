name: main_business
title: Main Business
description: 查询上市公司主营构成，按产品/行业/地区等维度拆分，支持报告期 Q2/Q4，输出 CSV。
parameters:
  securities:
    type: string
    description: 逗号分隔；可为证券名称、代码或拼音首字母
    required: true
  start_date:
    type: string
    description: 开始日期 yyyy-MM-dd。未指定时默认约为结束日往前三年
  end_date:
    type: string
    description: 结束日期 yyyy-MM-dd。未指定时默认今天
  period:
    type: string
    description: 仅 Q2 或 Q4；见上表。不传则不限定报告期
  breakdown:
    type: string
    description: product / industry / region。不传则三种维度并发全取
