name: valuation
title: Valuation
description: 查询估值指标（PE/PB/PS/PEG/PCF 等）及历史分位，多指标并发，输出 CSV。
parameters:
  securities:
    type: string
    description: 逗号分隔；可为证券名称、代码或拼音首字母
    required: true
  start_date:
    type: string
    description: 开始日期 yyyy-MM-dd。未指定时默认今天
  end_date:
    type: string
    description: 结束日期 yyyy-MM-dd。未指定时默认今天
  limit:
    type: integer
    description: 单次指标请求最大行数，默认 2000（接口上限以官方文档为准）
