name: block_constituents
title: Block Constituents
description: 按板块关键词或直接指定板块 ID，获取行业/概念/指数等板块的成分股列表，输出 CSV。关键词搜索仅返回匹配项（非全量板块目录），会排除指数成份类板块。
parameters:
  keyword:
    type: string
    description: 板块搜索关键词，支持中文名称、拼音/首字母
  sector_id:
    type: string
    description: 板块 ID（如 121000130），已知 ID 时可跳过搜索直接查成分股
  top:
    type: integer
    description: 关键词搜索返回条数上限，默认 10，最大 10（仅 keyword 时生效）
