name: earnings_review
title: Earnings Review
description: 针对指定报告期（如 2025q3）生成业绩点评：收入利润拆解、超预期/低于预期点、管理层表述与后续展望。需同时提供证券与 period。
parameters:
  security:
    type: string
    description: 单个证券名称或代码（推荐名称，如 贵州茅台；或代码 600519.SH）
  securities:
    type: array
    description: 多个证券名称或代码，逗号分隔；与 security 可同时使用并去重合并
    items:
      type: string
  period:
    type: string
    description: 报告期，如 2025q3
