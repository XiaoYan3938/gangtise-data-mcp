name: private_record
title: Private Record
description: 检索个人录音与转写记录列表，或按 record_ids 获取原文/语音识别/AI 速记；需账号授权。
parameters:
  keyword:
    type: string
    description: 录音标题关键词（search）
  record_ids:
    type: string
    description: 录音 ID 或标题，逗号分隔（提供后自动 get）
  content_types:
    type: array
    description: original / asr / summary / both（asr+summary）/ all（original+asr+summary）（get 模式）
    items:
      type: string
  start_time:
    type: string
    description: "起始时间，格式 yyyy-MM-dd 或 yyyy-MM-dd HH:mm:ss"
  end_time:
    type: string
    description: "结束时间，格式 yyyy-MM-dd 或 yyyy-MM-dd HH:mm:ss"
  category_list:
    type: array
    description: upload link mobile gtNote pc share，或中文（上传文件、手机录音、与我分享等）
    items:
      type: string
  space_type_list:
    type: array
    description: 1 我的速记、2 租户速记（可传中文）
    items:
      type: string
  limit:
    type: integer
    description: search 列表条数上限（默认 100）
  page_from:
    type: integer
    description: 分页起始（从 0 开始）
  page_size:
    type: integer
    description: 每页条数
