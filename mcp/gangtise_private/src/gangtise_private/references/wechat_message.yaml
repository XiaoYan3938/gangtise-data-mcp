name: wechat_message
title: Wechat Message
description: 检索已绑定微信群列表，或按 wechat_group_id_list 拉取群聊消息。需已激活群消息助理。
parameters:
  room_name:
    type: string
    description: 群名称，逗号分隔（search → roomName）
  keyword:
    type: string
    description: search：未传 room_name 时作群名，或与 room_name 并用作群列表过滤；get：消息内容关键词
  wechat_group_id_list:
    type: array
    description: 群 ID 或群名，逗号分隔（提供后自动 get）
    items:
      type: string
  page_from:
    type: integer
    description: 分页；page-size 最大 50
  page_size:
    type: integer
    description: 分页；page-size 最大 50
  start_time:
    type: string
    description: "起始时间，格式 yyyy-MM-dd 或 yyyy-MM-dd HH:mm:ss"
  end_time:
    type: string
    description: "结束时间，格式 yyyy-MM-dd 或 yyyy-MM-dd HH:mm:ss"
  industry_id_list:
    type: array
    description: 行业 ID 列表
    items:
      type: string
  category_list:
    type: array
    description: text,image,documents,url（get）
    items:
      type: string
  tag_list:
    type: array
    description: 标签代码或中文（如 路演→roadShow）（get）
    items:
      type: string
  limit:
    type: integer
    description: search：最多返回群数（默认 50）；get：最多消息条数（默认 500）
