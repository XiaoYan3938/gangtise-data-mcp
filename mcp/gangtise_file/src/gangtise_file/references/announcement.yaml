name: announcement
title: Announcement
description: 检索 A 股/港股公告索引，可按证券、日期、公告类型筛选；可选下载全文。
parameters:
  keyword:
    type: string
    description: 检索关键词，可为空
  securities:
    type: array
    description: 证券列表，逗号分隔；可为证券名称、代码或拼音首字母
    items:
      type: string
  start_date:
    type: string
    description: 开始日期，如 2026-01-01
  end_date:
    type: string
    description: 结束日期，如 2026-12-31
  category_list:
    type: array
    description: 公告分类列表，逗号分隔（请先调用 get_announcement_types 获取可选值）
    items:
      type: string
  search_type:
    type: integer
    description: 搜索类型：1-标题搜索 2-全文搜索
  rank_type:
    type: integer
    description: 排序方式：1-综合排序 2-时间倒序
  limit:
    type: integer
    description: 返回数量上限
  download:
    type: boolean
    description: 是否在检索后自动下载所有对应公司公告文件，默认不下载
  output_dir:
    type: string
    description: 所有下载文件保存的目录，建议使用绝对路径。默认保存在 gangtise 工作目录下的 announcements 目录
  download_types:
    type: array
    description: 下载文件类型，逗号分隔。可选：pdf, markdown
    items:
      type: string
