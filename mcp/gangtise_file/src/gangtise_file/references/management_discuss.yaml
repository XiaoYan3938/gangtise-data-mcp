name: management_discuss
title: Management Discuss
description: 获取上市公司管理层讨论与分析（MD&A），含半年报/年报正文或业绩会口径，需指定报告期、证券与讨论维度。
parameters:
  discuss_type:
    type: string
    description: 管理层讨论类型
    required: true
  report_date:
    type: string
    description: 报告期，严格为 yyyy-MM-dd 格式
    required: true
  securities:
    type: string
    description: 证券列表，逗号分隔；可为证券名称、代码或拼音首字母
    required: true
  discussion_dimension:
    type: string
    description: 讨论维度，见下表
    required: true
