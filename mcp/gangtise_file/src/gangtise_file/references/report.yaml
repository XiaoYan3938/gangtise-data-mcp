name: report
title: Report
description: 检索国内卖方研报，支持机构、行业、评级、页数、语义标签等；可选下载 PDF/Markdown。
parameters:
  keyword:
    type: string
    description: 检索关键词，可为空
  securities:
    type: array
    description: 证券列表，逗号分隔；可为证券名称、代码或拼音首字母
    items:
      type: string
  start_date:
    type: string
    description: 开始日期，如 2026-01-01
  end_date:
    type: string
    description: 结束日期，如 2026-12-31
  institutions:
    type: array
    description: 机构名称，逗号分隔；可选值见枚举脚本
    items:
      type: string
  industries:
    type: array
    description: 行业名称，逗号分隔；可选值见枚举脚本
    items:
      type: string
  source_types:
    type: array
    description: 来源类型，逗号分隔；可选值：研报、公众号
    items:
      type: string
  category_list:
    type: array
    description: 研报类别，逗号分隔。英文 code 或中文均可，如 industry,company 或 行业研究,公司研究（完整列表见 report.py help）
    items:
      type: string
  llm_tag_list:
    type: array
    description: 语义标签，逗号分隔。英文：inDepth/earningsReview/industryStrategy；或中文：深度报告/业绩点评/行业策略
    items:
      type: string
  rating_list:
    type: array
    description: rating_list
    items:
      type: string
  rating_change_list:
    type: array
    description: rating_change_list
    items:
      type: string
  min_report_pages:
    type: integer
    description: min_report_pages
  max_report_pages:
    type: integer
    description: max_report_pages
  search_type:
    type: integer
    description: search_type
  rank_type:
    type: integer
    description: rank_type
  limit:
    type: integer
    description: 返回数量上限，默认由系统配置
  download:
    type: boolean
    description: 是否在检索后自动下载所有对应研究报告文件，默认不下载
  download_types:
    type: array
    description: 下载文件类型，逗号分隔。可选：pdf, markdown
    items:
      type: string
  output_dir:
    type: string
    description: 所有下载文件保存的目录，建议使用绝对路径。默认保存在 gangtise 工作目录下的 report 目录
