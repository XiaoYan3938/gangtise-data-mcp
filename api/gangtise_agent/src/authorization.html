<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gangtise MCP - Authorization</title>
  <style>
    :root { --bg:#0f1419; --card:#1a2332; --accent:#3b82f6; --text:#e7ecf3; --muted:#9aa7b8; --err:#f87171; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1e3a5f 0%, transparent 55%), var(--bg); color: var(--text);
      display:flex; flex-direction:column; }
    header { padding:1.25rem 1.5rem; }
    header a { color:var(--text); text-decoration:none; font-weight:700; letter-spacing:.04em; }
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .card { width:100%; max-width:28rem; background:var(--card); border:1px solid #2a3a50; border-radius:12px; padding:1.75rem; }
    h1 { margin:0 0 .35rem; font-size:1.35rem; font-weight:600; }
    p { margin:0 0 1.25rem; color:var(--muted); font-size:.9rem; line-height:1.5; }
    label { display:block; font-size:.85rem; margin:0 0 .4rem; color:var(--text); }
    input { width:100%; padding:.75rem .9rem; border-radius:8px; border:1px solid #364b66;
      background:#0f1724; color:var(--text); margin-bottom:1rem; }
    input:focus { outline:none; border-color:var(--accent); }
    button { width:100%; padding:.8rem 1rem; border:0; border-radius:8px; background:var(--accent); color:#fff;
      font-weight:600; cursor:pointer; }
    button:hover { filter:brightness(1.08); }
    .hint { font-size:.8rem; margin-top:.75rem; color:var(--muted); }
    .hint a { color:#93c5fd; }
    .err { display:none; background:rgba(248,113,113,.12); border:1px solid rgba(248,113,113,.4);
      color:var(--err); border-radius:8px; padding:.75rem; margin-bottom:1rem; font-size:.85rem; }
  </style>
</head>
<body>
  <header><a href="https://open-platform.gangtise.com/" target="_blank" rel="noopener">GANGTISE</a></header>
  <main>
    <div class="card">
      <h1>授权访问 MCP</h1>
      <p>客户端 <strong id="client-id">…</strong> 请求读取 Gangtise 数据。请输入 Access Key / Secret Key。</p>
      <div id="error-box" class="err"></div>
      <form method="POST" action="/authorize" id="auth-form">
        <label for="access_key">Access Key</label>
        <input id="access_key" name="access_key" required autocomplete="username" placeholder="Access Key">
        <label for="secret_key">Secret Key</label>
        <input id="secret_key" name="secret_key" type="password" required autocomplete="current-password" placeholder="Secret Key">
        <button type="submit">Authorize Access</button>
      </form>
      <p class="hint">还没有账号？前往
        <a href="https://open-platform.gangtise.com/" target="_blank" rel="noopener">open-platform.gangtise.com</a>
        申请；登录后在「我的账号 → 账号列表」查看 AK/SK。
      </p>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    document.getElementById('client-id').textContent = params.get('client_id') || 'Unknown Client';
    const form = document.getElementById('auth-form');
    form.action = '/authorize?' + params.toString();
    const err = params.get('error_description') || params.get('error');
    if (err) {
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      box.textContent = err;
    }
  </script>
</body>
</html>
